services:
  airflow-postgres:
    image: postgres:16-alpine
    container_name: latam_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_init
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: /bin/bash
    command: -c "
      pip install requests python-dotenv psycopg2-binary &&
      airflow db migrate &&
      airflow users create \
        --username ${AIRFLOW_ADMIN_USERNAME} \
        --password ${AIRFLOW_ADMIN_PASSWORD} \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL}"

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/pipeline   # ← pointe vers python/src/
      AIRFLOW_VAR_RAW_DATA_PATH: ${RAW_DATA_PATH}
      # Variables Airflow auto-créées
      AIRFLOW_VAR_DB_HOST: ${DB_HOST}
      AIRFLOW_VAR_DB_NAME: ${DB_NAME}
      AIRFLOW_VAR_DB_USER: ${DB_USER}
      AIRFLOW_VAR_DB_PASSWORD: ${DB_PASSWORD}
      AIRFLOW_VAR_DB_SSLMODE: ${DB_SSLMODE}
      AIRFLOW_VAR_DB_CHANNELBINDING: ${DB_CHANNELBINDING}
      AIRFLOW_VAR_JSEARCH_APP_KEY: ${JSEARCH_APP_KEY}
      AIRFLOW_VAR_JSEARCH_APP_HOST: ${JSEARCH_APP_HOST}
      AIRFLOW_VAR_CAREERJET_APP_KEY: ${CAREERJET_APP_KEY}
      AIRFLOW_VAR_CAREERJET_USER_AGENT: ${CAREERJET_USER_AGENT}
      AIRFLOW_VAR_CAREERJET_REFERER: ${CAREERJET_REFERER}
      AIRFLOW_VAR_SERVER_IP: ${SERVER_IP}
    volumes:
      - ./ingestion/airflow/dags:/opt/airflow/dags       # ← DAGs
      - ./ingestion/python/src:/opt/airflow/pipeline     # ← scripts Python
      - ./ingestion/logs:/opt/airflow/logs
      - ./ingestion/raw:/opt/airflow/raw
      - ./ingestion/config:/opt/airflow/config   # config api requests
    command: scheduler

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/pipeline   # ← pointe vers python/src/
    volumes:
      - ./ingestion/airflow/dags:/opt/airflow/dags       # ← DAGs
      - ./ingestion/python/src:/opt/airflow/pipeline     # ← scripts Python
      - ./ingestion/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver


  
volumes:
  airflow_postgres_data: