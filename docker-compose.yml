services:

  # ──────────────────────────────────────────
  # Environnement Python
  # ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: latam_worker
    restart: "no"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_APP_KEY: ${DATABASE_APP_KEY}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      JSEARCH_APP_HOST: ${JSEARCH_APP_HOST}
      JSEARCH_APP_KEY: ${JSEARCH_APP_KEY}
    volumes:
      - ./python:/app/python
      - ./logs:/app/logs
    working_dir: /app
    command: ["python", "python/HelloWorld.py"]

  jupyter:
    image: jupyter/base-notebook
    container_name: latam_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
    env_file:
      - .env

  # ------------------- AIRFLOW -------------------

  # ──────────────────────────────────────────
  # Base de données PostgreSQL — Airflow
  # (métadonnées internes uniquement)
  # ──────────────────────────────────────────
  airflow-postgres:
    image: postgres:16-alpine
    container_name: latam_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Airflow — init (s'exécute une seule fois)
  # ──────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_init
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: /bin/bash
    command: -c "
      airflow db migrate &&
      airflow users create \
        --username ${AIRFLOW_ADMIN_USERNAME} \
        --password ${AIRFLOW_ADMIN_PASSWORD} \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL}"


  # ──────────────────────────────────────────
  # Airflow — Scheduler
  # ──────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: scheduler

  # ──────────────────────────────────────────
  # Airflow — Webserver (UI)
  # ──────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver

volumes:
  airflow_postgres_data: