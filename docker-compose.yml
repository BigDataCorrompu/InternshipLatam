services:

  # ──────────────────────────────────────────
  # Environnement Python
  # ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: latam_worker
    restart: "no"
    # depends_on:
    #   airflow-init:
    #     condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_APP_KEY: ${DATABASE_APP_KEY}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      JSEARCH_APP_HOST: ${JSEARCH_APP_HOST}
      JSEARCH_APP_KEY: ${JSEARCH_APP_KEY}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE}
      DB_CHANNELBIDING: ${DB_CHANNELBIDING}
    volumes:
      - ./ingestion/python:/app/python
    working_dir: /app
    command: ["python", "python/HelloWorld.py"]


  # ──────────────────────────────────────────
  # Environnement Airflow
  # ──────────────────────────────────────────

  airflow-postgres:
    image: postgres:16-alpine
    container_name: latam_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_init
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: /bin/bash
    command: -c "
      airflow db migrate &&
      airflow users create \
        --username ${AIRFLOW_ADMIN_USERNAME} \
        --password ${AIRFLOW_ADMIN_PASSWORD} \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL}"

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./ingestion/airflow/dags:/opt/airflow/dags
      - ./ingestion/logs:/opt/airflow/logs
    command: scheduler

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: latam_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
    volumes:
      - ./ingestion/airflow/dags:/opt/airflow/dags
      - ./ingestion/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver

volumes:
  airflow_postgres_data: